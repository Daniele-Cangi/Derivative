name: Forge CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run test suite
        run: python -B -m pytest -q -p no:cacheprovider

      - name: Run Forge benchmark quality gate
        run: >
          python forge_benchmark.py
          --preset extended
          --enforce-thresholds
          --min-status-accuracy 0.95
          --min-verified-at-1 0.95
          --max-false-verified-rate 0.00
          --min-infeasible-detection-rate 1.00

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-benchmark-reports
          path: generated_artifacts/forge_benchmarks/*.json
          if-no-files-found: ignore
